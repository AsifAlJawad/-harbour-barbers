<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harbour Barbers — Owner Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<script src="/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/api.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" integrity="sha384-mJ4MQEfB5R7qFvxDIDjqtF5Gr7QMp6sMCg2Kt4ikL6bTqJIh90NShiNkMWLLPbH" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" integrity="sha384-3u9UBbsOvVBVFm0gMaL7DX4OPO5OOhJxhZrGwFMoQ9KwmW1TvBRAtmhLFlGRCTq" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root{
    --cream:#f7f5f0;--beige:#eeebe4;--tan:#ccc7be;
    --accent:#8b2635;--dark:#18181a;--muted:#6a6560;
    --serif:'Cormorant Garamond',Georgia,serif;
    --sans:'DM Sans',system-ui,sans-serif;
  }
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  html,body,#root{height:100%;}
  body{font-family:var(--sans);color:var(--dark);overflow:hidden;}
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
  button{cursor:pointer;font-family:var(--sans);border:none;background:none;}
  input,select,textarea{font-family:var(--sans);}
  ::-webkit-scrollbar{width:5px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--tan);border-radius:3px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

function fmtMoney(cents) {
  const d = (cents || 0) / 100;
  if (d >= 10000) return '$' + (d / 1000).toFixed(0) + 'k';
  if (d >= 1000)  return '$' + (d / 1000).toFixed(1) + 'k';
  return '$' + Math.round(d).toLocaleString();
}

function fmtTime(iso) {
  const d = new Date(iso);
  const h = d.getHours(), m = d.getMinutes();
  const hd = h > 12 ? h - 12 : h || 12;
  return `${hd}:${m < 10 ? '0' + m : m} ${h >= 12 ? 'PM' : 'AM'}`;
}

const BARBER_COLORS = ['#8b2635','#2a4a7a','#2a6a4a','#3d3530','#6a4a2a','#4a2a6a'];

const INIT_HOURS_OWNER = [
  {day:'Monday',   open:'9:00 AM', close:'6:00 PM', closed:false},
  {day:'Tuesday',  open:'9:00 AM', close:'6:00 PM', closed:false},
  {day:'Wednesday',open:'9:00 AM', close:'6:00 PM', closed:false},
  {day:'Thursday', open:'9:00 AM', close:'7:00 PM', closed:false},
  {day:'Friday',   open:'9:00 AM', close:'6:00 PM', closed:false},
  {day:'Saturday', open:'10:00 AM',close:'5:00 PM', closed:false},
  {day:'Sunday',   open:'',        close:'',         closed:true},
];

function useIsMobile() {
  const [mob, setMob] = useState(window.innerWidth < 768);
  useEffect(() => {
    const h = () => setMob(window.innerWidth < 768);
    window.addEventListener('resize', h);
    return () => window.removeEventListener('resize', h);
  }, []);
  return mob;
}

function Skel({w='100%', h='20px', r='8px', style={}}) {
  return <div style={{width:w,height:h,borderRadius:r,background:'linear-gradient(90deg,var(--beige) 25%,var(--cream) 50%,var(--beige) 75%)',backgroundSize:'200% 100%',animation:'shimmer 1.4s infinite',...style}}/>;
}

function ErrorBanner({message}) {
  if (!message) return null;
  return <div style={{padding:'10px 14px',background:'#fff2f2',border:'1px solid #fca5a5',borderRadius:'8px',color:'#b91c1c',fontSize:'13px',marginBottom:'16px'}}>{message}</div>;
}

function Ico({d, size=16}) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
      stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
      <path d={d}/>
    </svg>
  );
}

function KpiCard({label, value, sub, trend, accent}) {
  const up = trend >= 0;
  return (
    <div style={{background:accent?'var(--dark)':'#fff',border:`1px solid ${accent?'transparent':'var(--beige)'}`,borderRadius:'12px',padding:'16px 18px'}}>
      <div style={{fontSize:'10px',fontWeight:'600',letterSpacing:'0.1em',textTransform:'uppercase',color:accent?'rgba(255,255,255,0.4)':'var(--muted)',marginBottom:'8px'}}>{label}</div>
      <div style={{fontFamily:'var(--serif)',fontSize:'30px',fontWeight:'700',lineHeight:'1',color:accent?'#fff':'var(--dark)',marginBottom:'5px'}}>{value}</div>
      <div style={{display:'flex',alignItems:'center',gap:'5px',flexWrap:'wrap'}}>
        {trend !== undefined && <span style={{fontSize:'11px',color:up?'#2a7a3a':'var(--accent)',fontWeight:'600'}}>{up?'↑':'↓'} {Math.abs(trend)}%</span>}
        <span style={{fontSize:'11px',color:accent?'rgba(255,255,255,0.38)':'var(--muted)'}}>{sub}</span>
      </div>
    </div>
  );
}

const NAV = [
  {id:'overview', label:'Overview',        short:'Home',      d:'M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z'},
  {id:'analytics',label:'Analytics',       short:'Analytics', d:'M18 20V10M12 20V4M6 20v-6'},
  {id:'staff',    label:'Staff & Payroll', short:'Staff',     d:'M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75M9 7a4 4 0 100 8 4 4 0 000-8z'},
  {id:'settings', label:'Settings',        short:'Settings',  d:'M12 15a3 3 0 100-6 3 3 0 000 6zM19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z'},
];

function MobileHeader() {
  return (
    <div style={{background:'var(--dark)',padding:'13px 20px',display:'flex',alignItems:'center',justifyContent:'space-between',borderBottom:'1px solid rgba(255,255,255,0.07)',flexShrink:0}}>
      <div style={{fontFamily:'var(--serif)',fontSize:'17px',fontWeight:'700',color:'#f7f5f0',letterSpacing:'0.04em',textTransform:'uppercase'}}>
        Harbour <span style={{color:'var(--accent)'}}>Barbers</span>
      </div>
      <div style={{background:'rgba(255,255,255,0.08)',borderRadius:'6px',padding:'3px',display:'flex',gap:'2px'}}>
        <button style={{padding:'4px 11px',borderRadius:'4px',fontSize:'11px',fontWeight:'500',background:'rgba(255,255,255,0.15)',color:'#f7f5f0',border:'none',cursor:'default'}}>Owner</button>
        <a href="staff.html" style={{padding:'4px 11px',borderRadius:'4px',fontSize:'11px',fontWeight:'500',background:'none',color:'rgba(255,255,255,0.4)',border:'none',cursor:'pointer',textDecoration:'none'}}>Staff View</a>
      </div>
    </div>
  );
}

function MobileNav({items, view, setView}) {
  return (
    <nav style={{background:'var(--dark)',borderTop:'1px solid rgba(255,255,255,0.1)',display:'flex',flexShrink:0,paddingBottom:'env(safe-area-inset-bottom,0px)'}}>
      {items.map(item => {
        const active = view === item.id;
        return (
          <button key={item.id} onClick={() => setView(item.id)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:'3px',padding:'10px 2px 12px',border:'none',background:'none',cursor:'pointer',color:active?'#fff':'rgba(255,255,255,0.4)',transition:'color 0.15s',position:'relative'}}>
            {active && <div style={{position:'absolute',top:0,left:'50%',transform:'translateX(-50%)',width:'20px',height:'2px',background:'var(--accent)',borderRadius:'0 0 2px 2px'}}/>}
            <Ico d={item.d} size={18}/>
            <span style={{fontSize:'9.5px',fontWeight:active?'600':'400'}}>{item.short||item.label}</span>
          </button>
        );
      })}
    </nav>
  );
}

function Sidebar({view, setView, user}) {
  const initials = user?.full_name ? user.full_name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase() : 'O';
  const name = user?.full_name || user?.email || 'Owner';
  return (
    <div style={{width:'252px',minWidth:'252px',height:'100%',background:'var(--dark)',display:'flex',flexDirection:'column'}}>
      <div style={{padding:'26px 28px 20px',borderBottom:'1px solid rgba(255,255,255,0.07)'}}>
        <div style={{fontFamily:'var(--serif)',fontSize:'19px',fontWeight:'700',color:'#f7f5f0',letterSpacing:'0.04em',textTransform:'uppercase'}}>
          Harbour <span style={{color:'var(--accent)'}}>Barbers</span>
        </div>
        <div style={{fontSize:'11px',color:'rgba(255,255,255,0.3)',letterSpacing:'0.14em',textTransform:'uppercase',marginTop:'3px'}}>Owner Portal</div>
      </div>
      <div style={{padding:'18px 28px 16px',borderBottom:'1px solid rgba(255,255,255,0.07)'}}>
        <div style={{display:'flex',alignItems:'center',gap:'11px',marginBottom:'12px'}}>
          <div style={{width:'40px',height:'40px',borderRadius:'50%',background:'var(--accent)',color:'#fff',fontFamily:'var(--serif)',fontWeight:'700',fontSize:'18px',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{initials}</div>
          <div>
            <div style={{color:'#f7f5f0',fontWeight:'500',fontSize:'14px'}}>{name}</div>
            <div style={{display:'flex',alignItems:'center',gap:'5px',marginTop:'2px'}}>
              <div style={{width:'6px',height:'6px',borderRadius:'50%',background:'#4ade80'}}/>
              <div style={{color:'rgba(255,255,255,0.35)',fontSize:'12px'}}>Full Access</div>
            </div>
          </div>
        </div>
        <div style={{background:'rgba(255,255,255,0.06)',borderRadius:'7px',padding:'4px',display:'flex',gap:'3px'}}>
          <button style={{flex:1,padding:'5px',borderRadius:'5px',fontSize:'12px',fontWeight:'500',background:'rgba(255,255,255,0.12)',color:'#f7f5f0',border:'none',cursor:'default'}}>Owner</button>
          <a href="staff.html" style={{flex:1,padding:'5px',borderRadius:'5px',fontSize:'12px',fontWeight:'500',background:'none',color:'rgba(255,255,255,0.35)',border:'none',cursor:'pointer',textDecoration:'none',textAlign:'center',display:'block'}}>Staff View</a>
        </div>
      </div>
      <nav style={{flex:1,padding:'12px 0',overflowY:'auto'}}>
        {NAV.map(item => {
          const active = view === item.id;
          return (
            <button key={item.id} onClick={() => setView(item.id)} style={{display:'flex',alignItems:'center',gap:'11px',padding:'10px 28px',color:active?'#f7f5f0':'rgba(255,255,255,0.4)',background:active?'rgba(255,255,255,0.06)':'none',fontSize:'13.5px',fontWeight:active?'500':'400',cursor:'pointer',border:'none',width:'100%',textAlign:'left',borderLeft:active?'2px solid var(--accent)':'2px solid transparent',transition:'all 0.14s'}}>
              <Ico d={item.d}/> {item.label}
            </button>
          );
        })}
      </nav>
      <div style={{padding:'18px 28px',borderTop:'1px solid rgba(255,255,255,0.07)',display:'flex',flexDirection:'column',gap:'10px'}}>
        <a href="index.html" style={{color:'rgba(255,255,255,0.3)',fontSize:'13px',textDecoration:'none',display:'flex',alignItems:'center',gap:'6px'}}>
          <Ico d="M19 12H5M12 19l-7-7 7-7" size={14}/> Back to site
        </a>
        <button onClick={async()=>{await window.API.signOut();window.location.href='index.html';}} style={{color:'rgba(255,255,255,0.25)',fontSize:'12px',background:'none',border:'none',cursor:'pointer',textAlign:'left',padding:0,display:'flex',alignItems:'center',gap:'6px',fontFamily:'var(--sans)'}}>
          <Ico d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" size={13}/> Sign Out
        </button>
      </div>
    </div>
  );
}

function OverviewView({analytics, schedule, error, isMobile}) {
  if (!analytics) return (
    <div>
      <Skel w='220px' h='30px' r='6px' style={{marginBottom:'8px'}}/>
      <Skel w='160px' h='14px' r='4px' style={{marginBottom:'22px'}}/>
      <div style={{display:'grid',gridTemplateColumns:isMobile?'1fr 1fr':'1.2fr 1fr 1fr 1fr',gap:'10px',marginBottom:'14px'}}>
        {[0,1,2,3].map(i=><Skel key={i} h='88px' r='12px'/>)}
      </div>
      <div style={{display:'grid',gridTemplateColumns:isMobile?'1fr':'1.6fr 1fr',gap:'12px'}}>
        <Skel h='240px' r='13px'/><Skel h='240px' r='13px'/>
      </div>
    </div>
  );

  const remaining = schedule.filter(a => ['pending','confirmed'].includes(a.status));
  const topSvcs   = analytics.top_services || [];
  const maxRev    = topSvcs[0]?.revenue || 1;
  const now       = new Date();
  const month     = now.toLocaleString('en-US', {month:'long', year:'numeric'});

  return (
    <div>
      <ErrorBanner message={error}/>
      <div style={{marginBottom:'20px'}}>
        <div style={{fontFamily:'var(--serif)',fontSize:'12px',color:'var(--muted)',letterSpacing:'0.06em',textTransform:'uppercase',marginBottom:'4px'}}>{now.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</div>
        <div style={{fontFamily:'var(--serif)',fontSize:isMobile?'26px':'36px',fontWeight:'700',lineHeight:'1'}}>Good morning</div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:isMobile?'1fr 1fr':'1.2fr 1fr 1fr 1fr',gap:'10px',marginBottom:'14px'}}>
        <KpiCard label="Month Revenue"      value={fmtMoney(analytics.month_revenue)}   sub={month} accent/>
        <KpiCard label="Appointments"       value={analytics.month_appointments}         sub="completed this month"/>
        <KpiCard label="This Week"          value={analytics.week_appointments+' appts'} sub="confirmed + done"/>
        <KpiCard label="Active Customers"   value={analytics.unique_customers}           sub="this month"/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:isMobile?'1fr':'1.6fr 1fr',gap:'12px'}}>
        <div style={{background:'#fff',border:'1px solid var(--beige)',borderRadius:'13px',padding:'18px 20px'}}>
          <div style={{fontFamily:'var(--serif)',fontSize:'18px',fontWeight:'600',marginBottom:'16px'}}>Top Services This Month</div>
          {topSvcs.length === 0 ? (
            <div style={{color:'var(--muted)',fontSize:'13px',padding:'16px 0'}}>No completed appointments this month.</div>
          ) : topSvcs.map((s, i) => (
            <div key={s.name} style={{marginBottom:'14px'}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:'13.5px',marginBottom:'5px'}}>
                <span style={{fontWeight:'500'}}>{s.name}</span>
                <span style={{fontFamily:'var(--serif)',fontWeight:'700',color:'var(--accent)'}}>{fmtMoney(s.revenue)}</span>
              </div>
              <div style={{height:'6px',background:'var(--beige)',borderRadius:'3px',overflow:'hidden'}}>
                <div style={{height:'100%',width:Math.round(s.revenue/maxRev*100)+'%',background:'var(--accent)',borderRadius:'3px'}}/>
              </div>
              <div style={{fontSize:'11px',color:'var(--muted)',marginTop:'3px'}}>{s.bookings} bookings</div>
            </div>
          ))}
        </div>
        <div style={{background:'#fff',border:'1px solid var(--beige)',borderRadius:'13px',padding:'18px 20px'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}}>
            <div style={{fontFamily:'var(--serif)',fontSize:'18px',fontWeight:'600'}}>Remaining Today</div>
            <span style={{fontSize:'12px',background:'var(--beige)',padding:'3px 9px',borderRadius:'100px',color:'var(--muted)'}}>{remaining.length}</span>
          </div>
          {remaining.length === 0 ? (
            <div style={{color:'var(--muted)',fontSize:'13px',padding:'16px 0'}}>No upcoming appointments today.</div>
          ) : remaining.map((a, i) => (
            <div key={a.id} style={{display:'flex',alignItems:'center',gap:'10px',padding:'8px 0',borderBottom:i<remaining.length-1?'1px solid var(--beige)':'none'}}>
              <div style={{fontSize:'12px',color:'var(--muted)',width:'58px',flexShrink:0}}>{fmtTime(a.scheduled_at)}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:'13px',fontWeight:'500',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.profiles?.full_name || 'Unknown'}</div>
                <div style={{fontSize:'11px',color:'var(--muted)'}}>{a.services?.name || '—'}</div>
              </div>
              <div style={{fontSize:'12px',color:'var(--muted)',flexShrink:0}}>{a.barbers?.name?.split(' ')[0] || '—'}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function AnalyticsView({analytics, error, isMobile}) {
  if (!analytics) return (
    <div>
      <Skel w='180px' h='36px' r='6px' style={{marginBottom:'8px'}}/>
      <Skel w='240px' h='14px' r='4px' style={{marginBottom:'20px'}}/>
      <div style={{display:'grid',gridTemplateColumns:isMobile?'1fr 1fr':'repeat(4,1fr)',gap:'10px',marginBottom:'14px'}}>
        {[0,1,2,3].map(i=><Skel key={i} h='88px' r='12px'/>)}
      </div>
      <div style={{display:'grid',gridTemplateColumns:isMobile?'1fr':'1fr 1fr',gap:'12px'}}>
        <Skel h='280px' r='13px'/><Skel h='280px' r='13px'/>
      </div>
    </div>
  );

  const topSvcs    = analytics.top_services || [];
  const barbers    = analytics.barber_stats || [];
  const maxSvcRev  = topSvcs[0]?.revenue || 1;
  const maxBarbRev = barbers[0]?.revenue || 1;
  const totalBarbRev = barbers.reduce((s, b) => s + b.revenue, 0);
  const now   = new Date();
  const month = now.toLocaleString('en-US', {month:'long', year:'numeric'});

  return (
    <div>
      <ErrorBanner message={error}/>
      <div style={{fontFamily:'var(--serif)',fontSize:isMobile?'26px':'36px',fontWeight:'700',marginBottom:'4px'}}>Analytics</div>
      <div style={{color:'var(--muted)',fontSize:'13px',marginBottom:'20px'}}>{month} performance breakdown</div>
      <div style={{display:'grid',gridTemplateColumns:isMobile?'1fr 1fr':'repeat(4,1fr)',gap:'10px',marginBottom:'14px'}}>
        <KpiCard label="Revenue"          value={fmtMoney(analytics.month_revenue)} sub="completed appts" accent/>
        <KpiCard label="Appointments"     value={analytics.month_appointments}       sub="completed"/>
        <KpiCard label="Unique Customers" value={analytics.unique_customers}         sub="this month"/>
        <KpiCard label="New Customers"    value={analytics.new_customers}            sub="joined"/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:isMobile?'1fr':'1fr 1fr',gap:'12px'}}>
        <div style={{background:'#fff',border:'1px solid var(--beige)',borderRadius:'13px',padding:'20px 22px'}}>
          <div style={{fontFamily:'var(--serif)',fontSize:'18px',fontWeight:'600',marginBottom:'16px'}}>Revenue by Service</div>
          {topSvcs.length === 0 ? (
            <div style={{color:'var(--muted)',fontSize:'13px'}}>No data yet.</div>
          ) : topSvcs.map(s => (
            <div key={s.name} style={{marginBottom:'13px'}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:'13.5px',marginBottom:'4px'}}>
                <span style={{fontWeight:'500'}}>{s.name}</span>
                <span style={{fontFamily:'var(--serif)',fontWeight:'700',color:'var(--accent)'}}>{fmtMoney(s.revenue)}</span>
              </div>
              <div style={{height:'6px',background:'var(--beige)',borderRadius:'3px',overflow:'hidden'}}>
                <div style={{height:'100%',width:Math.round(s.revenue/maxSvcRev*100)+'%',background:'var(--accent)',borderRadius:'3px'}}/>
              </div>
              <div style={{fontSize:'11px',color:'var(--muted)',marginTop:'2px'}}>{s.bookings} bookings</div>
            </div>
          ))}
        </div>
        <div style={{background:'#fff',border:'1px solid var(--beige)',borderRadius:'13px',padding:'20px 22px'}}>
          <div style={{fontFamily:'var(--serif)',fontSize:'18px',fontWeight:'600',marginBottom:'16px'}}>Barber Performance</div>
          {barbers.length === 0 ? (
            <div style={{color:'var(--muted)',fontSize:'13px'}}>No data yet.</div>
          ) : barbers.map((b, i) => {
            const color = BARBER_COLORS[i % BARBER_COLORS.length];
            return (
              <div key={b.name} style={{marginBottom:'14px'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'5px'}}>
                  <div style={{display:'flex',alignItems:'center',gap:'7px'}}>
                    <div style={{width:'8px',height:'8px',borderRadius:'50%',background:color,flexShrink:0}}/>
                    <span style={{fontSize:'14px',fontWeight:'500'}}>{b.name}</span>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                    <span style={{fontSize:'12px',color:'var(--muted)'}}>{b.bookings} appts</span>
                    <span style={{fontFamily:'var(--serif)',fontSize:'16px',fontWeight:'700',color:'var(--accent)'}}>{fmtMoney(b.revenue)}</span>
                  </div>
                </div>
                <div style={{height:'7px',background:'var(--beige)',borderRadius:'4px',overflow:'hidden'}}>
                  <div style={{height:'100%',width:Math.round(b.revenue/maxBarbRev*100)+'%',background:color,borderRadius:'4px'}}/>
                </div>
              </div>
            );
          })}
          {totalBarbRev > 0 && (

              <span style={{fontSize:'14px',fontWeight:'500'}}>Total</span>

    </div>
  );
}

      </div>
      <Skel h='160px' r='13px'/>

  const barbers  = analytics.barber_stats || [];

  const month    = now.toLocaleString('en-US', {month:'long', year:'numeric'});

                  <div style={{display:'flex',alignItems:'center',gap:'12px',marginBottom:'12px'}}>
                    <div style={{width:'46px',height:'46px',borderRadius:'50%',background:color,color:'#fff',fontFamily:'var(--serif)',fontWeight:'700',fontSize:'19px',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{initials}</div>
                    <div>
                      <div style={{fontFamily:'var(--serif)',fontSize:'20px',fontWeight:'700',color:rank===0?'#fff':'var(--dark)',marginBottom:'1px'}}>{b.name}</div>
                      <div style={{fontSize:'12px',color:rank===0?'rgba(255,255,255,0.4)':'var(--muted)'}}>{b.bookings} bookings this month</div>
                    </div>
                  </div>
                  <div style={{fontFamily:'var(--serif)',fontSize:'30px',fontWeight:'700',color:rank===0?'rgba(255,255,255,0.9)':'var(--accent)',marginBottom:'2px'}}>{fmtMoney(b.revenue)}</div>
                  <div style={{fontSize:'12px',color:rank===0?'rgba(255,255,255,0.35)':'var(--muted)',marginBottom:'12px'}}>revenue generated</div>
                  <div style={{background:rank===0?'rgba(255,255,255,0.07)':'var(--cream)',borderRadius:'7px',padding:'9px 10px'}}>
                    <div style={{fontSize:'10px',color:rank===0?'rgba(255,255,255,0.35)':'var(--muted)',letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:'2px'}}>Avg / booking</div>
                    <div style={{fontSize:'16px',fontFamily:'var(--serif)',fontWeight:'700',color:rank===0?'#fff':'var(--dark)'}}>{fmtMoney(avgVal)}</div>
                  </div>
                </div>
              );
            })}
          </div>
          {totalRev > 0 && (
            <div style={{background:'#fff',border:'1px solid var(--beige)',borderRadius:'13px',padding:'20px 22px'}}>
              <div style={{fontFamily:'var(--serif)',fontSize:'18px',fontWeight:'600',marginBottom:'14px'}}>Revenue Split</div>
              {barbers.map((b, i) => {
                const color = BARBER_COLORS[i % BARBER_COLORS.length];
                return (
                  <div key={b.name} style={{marginBottom:'13px'}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'5px'}}>
                      <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                        <div style={{width:'8px',height:'8px',borderRadius:'50%',background:color,flexShrink:0}}/>
                        <span style={{fontSize:'14px',fontWeight:'500'}}>{b.name}</span>
                      </div>
                      <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
                        <span style={{fontSize:'12px',color:'var(--muted)'}}>{Math.round(b.revenue/totalRev*100)}%</span>
                        <span style={{fontFamily:'var(--serif)',fontSize:'16px',fontWeight:'700',color:'var(--accent)'}}>{fmtMoney(b.revenue)}</span>
                      </div>
                    </div>
                    <div style={{height:'8px',background:'var(--beige)',borderRadius:'4px',overflow:'hidden'}}>
                      <div style={{height:'100%',width:Math.round(b.revenue/totalRev*100)+'%',background:color,borderRadius:'4px'}}/>
                    </div>
                  </div>
                );
              })}
              <div style={{marginTop:'14px',paddingTop:'12px',borderTop:'1px solid var(--beige)',display:'flex',justifyContent:'space-between'}}>
                <span style={{fontSize:'14px',fontWeight:'500'}}>Total ({now.toLocaleString('en-US',{month:'long'})})</span>
                <span style={{fontFamily:'var(--serif)',fontSize:'19px',fontWeight:'700',color:'var(--accent)'}}>{fmtMoney(totalRev)}</span>
              </div>
            </div>
          )}
        </>
      )}
    </div>
  );
}

function SettingsView({isMobile}) {

          ))}

          </div>

      )}
    </div>
  );
}

  const [schedule,  setSchedule]  = useState([]);
  const [user,      setUser]      = useState(null);
  const [error,     setError]     = useState(null);

  useEffect(() => {
    window.API.supabase().auth.getSession().then(async ({ data: { session } }) => {
      if (!session) { window.location.href = 'index.html'; return; }
      try {
        const me = await window.API.getMe();
        if (me.role !== 'owner') { window.location.href = 'staff.html'; return; }
        setUser(me);
        const [an, sc] = await Promise.all([window.API.getAnalytics(), window.API.getSchedule()]);
        setAnalytics(an);
        setSchedule(sc || []);
      } catch(e) {
        setError(e.message);
        setAnalytics({month_appointments:0,month_revenue:0,new_customers:0,week_appointments:0,unique_customers:0,top_services:[],barber_stats:[]});
        setAuthReady(true);
        return;
      }
      setAuthReady(true);
    });
  }, []);

  if (!authReady) return (
    <div style={{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--cream)',flexDirection:'column',gap:'12px'}}>
      <div style={{fontFamily:'var(--serif)',fontSize:'22px',color:'var(--dark)'}}>Harbour Barbers</div>
      <div style={{fontSize:'13px',color:'var(--muted)'}}>Loading dashboard…</div>
    </div>
  );

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100vh',overflow:'hidden'}}>
      {isMobile && <MobileHeader/>}
      <div style={{display:'flex',flex:1,overflow:'hidden'}}>
        {!isMobile && <Sidebar view={view} setView={setView} user={user}/>}
        <main style={{flex:1,overflowY:'auto',background:'var(--cream)',padding:isMobile?'20px 16px':'44px 52px'}}>
          {view === 'overview'  && <OverviewView  analytics={analytics} schedule={schedule} error={error} isMobile={isMobile}/>}
          {view === 'analytics' && <AnalyticsView analytics={analytics} error={error} isMobile={isMobile}/>}
          {view === 'staff'     && <StaffView     analytics={analytics} error={error} isMobile={isMobile}/>}
          {view === 'settings'  && <SettingsView  isMobile={isMobile}/>}
        </main>
      </div>
      {isMobile && <MobileNav items={NAV} view={view} setView={setView}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
