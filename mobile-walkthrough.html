<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Harbour Barbers — Mobile App</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: #080608; }
  #root { position: fixed; inset: 0; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  @keyframes glow  { 0%,100%{opacity:.4} 50%{opacity:.7} }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── Design tokens ── */
const T = {
  bg:      '#080608',
  surface: 'rgba(255,255,255,0.035)',
  border:  'rgba(255,255,255,0.07)',
  accent:  '#8b2635',
  accentL: '#b03245',
  gold:    '#c9a96e',
  cream:   '#f7f5f0',
  muted:   'rgba(247,245,240,0.45)',
  dim:     'rgba(247,245,240,0.18)',
};

/* ── Entrance animation hook ── */
function useEnter(active, delay = 0) {
  const [on, setOn] = useState(false);
  useEffect(() => {
    if (!active) { setOn(false); return; }
    const t = setTimeout(() => setOn(true), delay + 80);
    return () => clearTimeout(t);
  }, [active, delay]);
  return on;
}

/* ── Noise texture overlay (CSS-only grain) ── */
const Noise = () => (
  <div style={{
    position: 'absolute', inset: 0, pointerEvents: 'none', zIndex: 50,
    backgroundImage: `url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E")`,
    backgroundSize: '128px 128px', opacity: .6,
  }}/>
);

/* ── Realistic iPhone frame ── */
function Phone({ children, glow = T.accent, style = {} }) {
  return (
    <div style={{ position: 'relative', ...style }}>
      {/* ambient glow */}
      <div style={{
        position: 'absolute', top: '10%', left: '5%', right: '5%', bottom: '5%',
        background: glow, filter: 'blur(80px)', opacity: .22,
        borderRadius: '50%', animation: 'glow 4s ease-in-out infinite',
      }}/>
      {/* phone body */}
      <div style={{
        position: 'relative', width: 340, background: 'linear-gradient(160deg,#2a2a2c 0%,#1a1a1c 50%,#111113 100%)',
        borderRadius: 62, padding: '17px 15px',
        boxShadow: '0 0 0 1px rgba(255,255,255,.12), 0 0 0 1.5px rgba(0,0,0,.8), 0 40px 120px rgba(0,0,0,.8), 0 8px 30px rgba(0,0,0,.5)',
      }}>
        {/* left buttons */}
        <div style={{ position:'absolute', left:-3, top:109, width:3, height:39, background:'#2a2a2c', borderRadius:'3px 0 0 3px', boxShadow:'-1px 0 2px rgba(0,0,0,.4)' }}/>
        <div style={{ position:'absolute', left:-3, top:163, width:3, height:75, background:'#2a2a2c', borderRadius:'3px 0 0 3px', boxShadow:'-1px 0 2px rgba(0,0,0,.4)' }}/>
        <div style={{ position:'absolute', left:-3, top:250, width:3, height:75, background:'#2a2a2c', borderRadius:'3px 0 0 3px', boxShadow:'-1px 0 2px rgba(0,0,0,.4)' }}/>
        {/* right button */}
        <div style={{ position:'absolute', right:-3, top:194, width:3, height:109, background:'#2a2a2c', borderRadius:'0 3px 3px 0', boxShadow:'1px 0 2px rgba(0,0,0,.4)' }}/>
        {/* screen */}
        <div style={{ borderRadius: 48, overflow: 'hidden', background: '#f7f5f0', position: 'relative', minHeight: 680, display: 'flex', flexDirection: 'column' }}>
          {/* dynamic island */}
          <div style={{
            position: 'absolute', top: 17, left: '50%', transform: 'translateX(-50%)',
            width: 109, height: 12, background: '#111', borderRadius: 10, zIndex: 10,
            boxShadow: '0 0 0 1px rgba(255,255,255,.06)',
          }}/>
          <div style={{ display:'flex', flexDirection:'column', flex: 1 }}>
            {children}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── Status bar ── */
const StatusBar = ({ dark }) => (
  <div style={{
    display: 'flex', justifyContent: 'space-between', alignItems: 'center',
    padding: '10px 20px 0', fontSize: 9, fontWeight: 600,
    color: dark ? 'rgba(255,255,255,.8)' : 'rgba(0,0,0,.7)',
  }}>
    <span>9:41</span>
    <span style={{ display:'flex', gap:3, alignItems:'center' }}>
      <span>●●●●</span><span>WiFi</span><span>■</span>
    </span>
  </div>
);

/* ── Tab bar ── */
const TabBar = ({ active }) => {
  const tabs = [['✂','Book'],['◻','Bookings'],['★','Rewards'],['○','Profile']];
  return (
    <div style={{ background:'#fff', borderTop:'1px solid #eeebe4', display:'flex', paddingBottom: 8, paddingTop: 6, marginTop:'auto' }}>
      {tabs.map(([icon,label],i) => (
        <div key={label} style={{ flex:1, textAlign:'center' }}>
          <div style={{ fontSize: 16, color: i===active ? T.accent : '#bbb' }}>{icon}</div>
          <div style={{ fontSize: 8, marginTop: 2, color: i===active ? T.accent : '#bbb', fontWeight: i===active ? 600 : 400 }}>{label}</div>
        </div>
      ))}
    </div>
  );
};

/* ── Big decorative number ── */
const Num = ({ n, active }) => {
  const on = useEnter(active);
  return (
    <div style={{
      fontFamily:'Cormorant Garamond', fontSize:'clamp(140px,18vw,220px)', fontWeight:300,
      color: 'transparent',
      WebkitTextStroke: '1px rgba(255,255,255,0.06)',
      lineHeight:1, userSelect:'none', letterSpacing:'-4px',
      opacity: on ? 1 : 0, transform: on ? 'none' : 'translateX(-20px)',
      transition: 'all .8s ease .1s', position:'absolute', top:'-0.15em', left:'-0.08em',
      pointerEvents:'none',
    }}>{n}</div>
  );
};

/* ── Bullet check ── */
const Check = ({ children }) => (
  <div style={{ display:'flex', alignItems:'flex-start', gap:12, marginBottom:11 }}>
    <div style={{
      width:18, height:18, borderRadius:'50%', background:T.accent,
      display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, marginTop:1,
    }}>
      <span style={{ color:'#fff', fontSize:9, fontWeight:700 }}>✓</span>
    </div>
    <span style={{ color:T.muted, fontSize:13.5, lineHeight:1.55 }}>{children}</span>
  </div>
);

/* ── Thin divider line ── */
const Line = ({ active, delay=0 }) => {
  const on = useEnter(active, delay);
  return (
    <div style={{
      height:1, background:`linear-gradient(90deg, ${T.accentL}, transparent)`,
      marginBottom:20, width: on ? '60px' : '0px',
      transition:'width .6s ease', opacity:.7,
    }}/>
  );
};

/* ═══════════════ SLIDE 1 — INTRO ═══════════════ */
function SlideIntro({ active }) {
  const a = useEnter(active);
  const b = useEnter(active, 300);
  const c = useEnter(active, 600);

  const miniPhone = (
    <div style={{ width:110, background:'#1a1a1c', borderRadius:20, padding:'5px 4px', boxShadow:'0 20px 60px rgba(0,0,0,.7), 0 0 0 1px rgba(255,255,255,.08)' }}>
      <div style={{ borderRadius:16, overflow:'hidden', background:'#f7f5f0' }}>
        <div style={{ background:'#18181a', padding:'14px 10px 8px', textAlign:'center' }}>
          <div style={{ fontFamily:'Cormorant Garamond', color:'#fff', fontSize:10, letterSpacing:.5 }}>HARBOUR</div>
          <div style={{ fontFamily:'Cormorant Garamond', color:T.accent, fontSize:10 }}>BARBERS</div>
        </div>
        <div style={{ padding:'6px 8px' }}>
          {['Classic Haircut · $35','Beard Trim · $20','Kids Cut · $25'].map(s=>(
            <div key={s} style={{ background:'#fff', border:'1px solid #eeebe4', borderRadius:4, padding:'4px 6px', marginBottom:3, fontSize:7, color:'#333' }}>{s}</div>
          ))}
        </div>
      </div>
    </div>
  );

  return (
    <div style={{ position:'relative', display:'flex', alignItems:'center', justifyContent:'center', height:'100%', overflow:'hidden' }}>
      <Noise/>
      {/* radial bg */}
      <div style={{ position:'absolute', inset:0, background:`radial-gradient(ellipse 60% 60% at 50% 50%, rgba(139,38,53,.12) 0%, transparent 70%)`, pointerEvents:'none' }}/>

      <div style={{ display:'flex', alignItems:'center', gap:80, zIndex:1 }}>
        {/* phones trio */}
        <div style={{ display:'flex', alignItems:'flex-end', gap:-20, position:'relative' }}>
          <div style={{ transform:'rotate(-8deg) translateY(20px)', opacity:b?1:0, transition:'all .7s ease .1s', transformOrigin:'bottom center', animation: b ? 'float 6s ease-in-out 1s infinite' : 'none' }}>{miniPhone}</div>
          <div style={{ transform:'scale(1.15) translateY(-10px)', zIndex:2, opacity:b?1:0, transition:'all .7s ease .3s', animation: b ? 'float 6s ease-in-out infinite' : 'none' }}>{miniPhone}</div>
          <div style={{ transform:'rotate(8deg) translateY(20px)', opacity:b?1:0, transition:'all .7s ease .5s', transformOrigin:'bottom center', animation: b ? 'float 6s ease-in-out .5s infinite' : 'none' }}>{miniPhone}</div>
        </div>

        {/* text */}
        <div style={{ opacity:a?1:0, transform:a?'none':'translateY(24px)', transition:'all .7s ease' }}>
          <div style={{ fontSize:10, letterSpacing:5, textTransform:'uppercase', color:T.gold, marginBottom:20, fontFamily:'DM Sans' }}>
            Mobile App Walkthrough
          </div>
          <div style={{ fontFamily:'Cormorant Garamond', fontWeight:300, lineHeight:1, color:T.cream, fontSize:'clamp(60px,7vw,88px)' }}>
            Harbour<br/><em style={{ color:T.accent }}>Barbers</em>
          </div>
          <div style={{ width:50, height:1, background:T.accentL, margin:'28px 0', opacity:.7 }}/>
          <div style={{ color:T.muted, fontSize:14, lineHeight:1.8, maxWidth:360 }}>
            A native iOS & Android booking app. Same live backend as the website. Book, manage, earn rewards.
          </div>
          <div style={{ opacity:c?1:0, transition:'all .5s ease', display:'flex', gap:8, marginTop:32, flexWrap:'wrap' }}>
            {['Sign In','Book','Bookings','Rewards','Profile'].map(l=>(
              <div key={l} style={{ background:T.surface, border:`1px solid ${T.border}`, borderRadius:20, padding:'5px 14px', fontSize:11, color:T.muted }}>
                {l}
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════ SLIDE 2 — SIGN IN ═══════════════ */
function SlideSignIn({ active }) {
  const a = useEnter(active);
  const b = useEnter(active, 200);
  return (
    <div style={{ position:'relative', display:'grid', gridTemplateColumns:'1fr 1fr', height:'100%', overflow:'hidden' }}>
      <Noise/>
      <div style={{ position:'absolute', inset:0, background:'radial-gradient(ellipse 50% 80% at 20% 50%, rgba(139,38,53,.08) 0%, transparent 60%)', pointerEvents:'none' }}/>

      {/* LEFT — copy */}
      <div style={{ display:'flex', flexDirection:'column', justifyContent:'center', padding:'0 60px 0 72px', position:'relative', zIndex:1 }}>
        <Num n="01" active={active}/>
        <div style={{ position:'relative' }}>
          <div style={{ fontSize:10, letterSpacing:4, textTransform:'uppercase', color:T.gold, marginBottom:16, opacity:a?1:0, transition:'all .5s ease', fontFamily:'DM Sans' }}>Authentication</div>
          <Line active={active}/>
          <div style={{ fontFamily:'Cormorant Garamond', fontSize:'clamp(38px,4vw,54px)', fontWeight:300, color:T.cream, lineHeight:1.1, marginBottom:24, opacity:a?1:0, transform:a?'none':'translateY(20px)', transition:'all .6s ease .1s' }}>
            Secure sign in<br/><em style={{ color:T.accent }}>& sign up</em>
          </div>
          <div style={{ opacity:b?1:0, transition:'all .5s ease .1s' }}>
            <Check>Email & password authentication</Check>
            <Check>Sign up directly inside the app</Check>
            <Check>Session persists between opens</Check>
            <Check>Auto-redirects based on account role</Check>
          </div>
        </div>
      </div>

      {/* RIGHT — phone */}
      <div style={{ display:'flex', alignItems:'center', justifyContent:'center', padding:'32px 60px', zIndex:1 }}>
        <div style={{ opacity:b?1:0, transform:b?'none':'translateY(40px)', transition:'all .7s ease .15s', animation:b?'float 7s ease-in-out infinite':'' }}>
          <Phone glow={T.accent}>
            <StatusBar dark={false}/>
            <div style={{ flex:1, display:'flex', flexDirection:'column', justifyContent:'center', padding:'20px 22px 32px' }}>
              <div style={{ textAlign:'center', marginBottom:36 }}>
                <div style={{ fontFamily:'Cormorant Garamond', fontSize:32, fontWeight:300, color:'#18181a', lineHeight:1 }}>HARBOUR</div>
                <div style={{ fontFamily:'Cormorant Garamond', fontSize:32, fontWeight:300, color:T.accent, lineHeight:1, marginBottom:8 }}>BARBERS</div>
                <div style={{ width:32, height:1, background:T.accent, margin:'0 auto', opacity:.4 }}/>
              </div>
              <div style={{ fontSize:11, color:'#6a6560', textAlign:'center', marginBottom:24 }}>Sign in to your account</div>
              {['Email address','Password'].map((p,i)=>(
                <div key={p} style={{ background:'#f0ede8', borderRadius:10, padding:'13px 16px', marginBottom:10, fontSize:12, color:'#aaa9a6', border:'1px solid #e8e4de' }}>{p}</div>
              ))}
              <div style={{ background:T.accent, color:'#fff', fontSize:13, fontWeight:600, padding:'14px', borderRadius:10, textAlign:'center', marginTop:6, letterSpacing:.3 }}>
                Sign In
              </div>
              <div style={{ textAlign:'center', marginTop:20, fontSize:11, color:'#aaa' }}>
                No account? <span style={{ color:T.accent, fontWeight:500 }}>Create one</span>
              </div>
            </div>
          </Phone>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════ SLIDE 3 — BOOK ═══════════════ */
function SlideBook({ active }) {
  const a = useEnter(active);
  const b = useEnter(active, 200);
  return (
    <div style={{ position:'relative', display:'grid', gridTemplateColumns:'1fr 1fr', height:'100%', overflow:'hidden' }}>
      <Noise/>
      <div style={{ position:'absolute', inset:0, background:'radial-gradient(ellipse 50% 80% at 80% 50%, rgba(139,38,53,.08) 0%, transparent 60%)', pointerEvents:'none' }}/>

      {/* LEFT — phone */}
      <div style={{ display:'flex', alignItems:'center', justifyContent:'center', padding:'32px 40px 32px 72px', zIndex:1 }}>
        <div style={{ opacity:b?1:0, transform:b?'none':'translateY(40px)', transition:'all .7s ease .15s', animation:b?'float 7s ease-in-out .5s infinite':'' }}>
          <Phone glow={T.accent}>
            <StatusBar dark={true}/>
            <div style={{ background:'#18181a', padding:'8px 16px 14px', marginTop:2 }}>
              <div style={{ display:'flex', gap:4, marginBottom:12 }}>
                {[['1','Service',true],['2','Barber',false],['3','Time',false],['4','✓',false]].map(([n,l,on])=>(
                  <div key={n} style={{ flex:1, textAlign:'center' }}>
                    <div style={{ width:20, height:20, borderRadius:'50%', margin:'0 auto 4px', display:'flex', alignItems:'center', justifyContent:'center', background:on?T.accent:'rgba(255,255,255,.08)', fontSize:9, fontWeight:700, color:on?'#fff':'rgba(255,255,255,.3)' }}>{n}</div>
                    <div style={{ fontSize:7, color:on?T.cream:'rgba(255,255,255,.25)', fontWeight:on?500:400 }}>{l}</div>
                  </div>
                ))}
              </div>
              <div style={{ color:'#fff', fontFamily:'Cormorant Garamond', fontSize:18 }}>Choose a service</div>
            </div>
            <div style={{ flex:1, padding:'12px', overflow:'hidden' }}>
              {[['✂ Classic Haircut','The essential cut','30 min','$35'],['✂ Haircut + Beard','Cut and full beard groom','45 min','$55'],['✂ Hot Towel Shave','Traditional wet shave','40 min','$45'],['✂ Kids Cut','For under 12s','20 min','$25'],['✂ Beard Trim','Shape & define','20 min','$20']].map(([n,d,dur,p])=>(
                <div key={n} style={{ background:'#fff', border:'1px solid #eeebe4', borderRadius:10, padding:'10px 12px', marginBottom:7, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                  <div>
                    <div style={{ fontSize:11, fontWeight:600, color:'#18181a' }}>{n}</div>
                    <div style={{ fontSize:9, color:'#aaa', marginTop:1 }}>{d}</div>
                    <div style={{ fontSize:9, color:'#888', marginTop:1 }}>{dur}</div>
                  </div>
                  <div style={{ fontFamily:'Cormorant Garamond', fontSize:18, fontWeight:600, color:T.accent }}>{p}</div>
                </div>
              ))}
            </div>
            <TabBar active={0}/>
          </Phone>
        </div>
      </div>

      {/* RIGHT — copy */}
      <div style={{ display:'flex', flexDirection:'column', justifyContent:'center', padding:'0 72px 0 40px', position:'relative', zIndex:1 }}>
        <Num n="02" active={active}/>
        <div style={{ position:'relative' }}>
          <div style={{ fontSize:10, letterSpacing:4, textTransform:'uppercase', color:T.gold, marginBottom:16, opacity:a?1:0, transition:'all .5s ease', fontFamily:'DM Sans' }}>Booking Flow</div>
          <Line active={active}/>
          <div style={{ fontFamily:'Cormorant Garamond', fontSize:'clamp(38px,4vw,54px)', fontWeight:300, color:T.cream, lineHeight:1.1, marginBottom:24, opacity:a?1:0, transform:a?'none':'translateY(20px)', transition:'all .6s ease .1s' }}>
            Book in<br/><em style={{ color:T.accent }}>4 simple steps</em>
          </div>
          <div style={{ opacity:b?1:0, transition:'all .5s ease .1s' }}>
            {[['1','Service','Browse all services with live pricing'],['2','Barber','Choose from available barbers'],['3','Time','See open slots for today'],['4','Confirm','Booking confirmed instantly']].map(([n,t,d])=>(
              <div key={n} style={{ display:'flex', gap:14, marginBottom:14, alignItems:'flex-start' }}>
                <div style={{ width:28, height:28, borderRadius:'50%', background:T.accent, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, fontWeight:700, color:'#fff', fontSize:11 }}>{n}</div>
                <div>
                  <div style={{ color:T.cream, fontSize:13, fontWeight:500, marginBottom:2 }}>{t}</div>
                  <div style={{ color:T.muted, fontSize:12 }}>{d}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════ SLIDE 4 — BOOKINGS ═══════════════ */
function SlideBookings({ active }) {
  const a = useEnter(active);
  const b = useEnter(active, 200);
  return (
    <div style={{ position:'relative', display:'grid', gridTemplateColumns:'1fr 1fr', height:'100%', overflow:'hidden' }}>
      <Noise/>
      <div style={{ position:'absolute', inset:0, background:'radial-gradient(ellipse 50% 80% at 20% 50%, rgba(139,38,53,.08) 0%, transparent 60%)', pointerEvents:'none' }}/>

      {/* LEFT — copy */}
      <div style={{ display:'flex', flexDirection:'column', justifyContent:'center', padding:'0 60px 0 72px', position:'relative', zIndex:1 }}>
        <Num n="03" active={active}/>
        <div style={{ position:'relative' }}>
          <div style={{ fontSize:10, letterSpacing:4, textTransform:'uppercase', color:T.gold, marginBottom:16, opacity:a?1:0, transition:'all .5s ease', fontFamily:'DM Sans' }}>Appointment History</div>
          <Line active={active}/>
          <div style={{ fontFamily:'Cormorant Garamond', fontSize:'clamp(38px,4vw,54px)', fontWeight:300, color:T.cream, lineHeight:1.1, marginBottom:24, opacity:a?1:0, transform:a?'none':'translateY(20px)', transition:'all .6s ease .1s' }}>
            All bookings<br/><em style={{ color:T.accent }}>in one place</em>
          </div>
          <div style={{ opacity:b?1:0, transition:'all .5s ease .1s' }}>
            <Check>Upcoming & past in a single list</Check>
            <Check>Live status badges per appointment</Check>
            <Check>Pull-to-refresh for live data</Check>
            <Check>Cancel with a single tap</Check>
          </div>
        </div>
      </div>

      {/* RIGHT — phone */}
      <div style={{ display:'flex', alignItems:'center', justifyContent:'center', padding:'32px 72px 32px 40px', zIndex:1 }}>
        <div style={{ opacity:b?1:0, transform:b?'none':'translateY(40px)', transition:'all .7s ease .15s', animation:b?'float 7s ease-in-out 1s infinite':'' }}>
          <Phone glow={T.accent}>
            <StatusBar dark={true}/>
            <div style={{ background:'#18181a', padding:'8px 16px 14px', marginTop:2 }}>
              <div style={{ color:'rgba(255,255,255,.5)', fontSize:9, marginBottom:2 }}>Pull down to refresh</div>
              <div style={{ color:'#fff', fontFamily:'Cormorant Garamond', fontSize:18 }}>My Bookings</div>
            </div>
            <div style={{ flex:1, padding:'12px' }}>
              {[['Haircut + Beard','with Marcus','Mon 23 Jun · 9:00 AM','confirmed','#eaf5ee','#2a6a4a'],
                ['Classic Haircut','with Daniel','Sat 28 Jun · 2:00 PM','pending','#e8eef5','#3d5a80'],
                ['Hot Towel Shave','with Marcus','Tue 1 Jul · 11:00','confirmed','#eaf5ee','#2a6a4a'],
                ['Classic Haircut','with Ryan','Mon 9 Jun · 10:00','completed','#f0f0f0','#888']
              ].map(([s,b,d,status,bg,col])=>(
                <div key={d} style={{ background:'#fff', border:'1px solid #eeebe4', borderRadius:10, padding:'10px 12px', marginBottom:7 }}>
                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
                    <div style={{ fontSize:11, fontWeight:600, color:'#18181a' }}>{s}</div>
                    <div style={{ background:bg, color:col, fontSize:8, padding:'3px 8px', borderRadius:20, fontWeight:500 }}>{status}</div>
                  </div>
                  <div style={{ fontSize:9, color:'#aaa', marginTop:3 }}>{b}</div>

}

/* ═══════════════ APP SHELL ═══════════════ */
const SLIDES = [SlideIntro, SlideSignIn, SlideBook, SlideBookings, SlideRewards, SlideProfile, SlideClose];
const LABELS = ['Intro','Sign In','Book','Bookings','Rewards','Profile',''];

function App() {
  const [cur, setCur] = useState(0);
  const [entering, setEntering] = useState(false);

  function go(n) {
    if (n < 0 || n >= SLIDES.length || entering) return;
    setEntering(true);
    setCur(n);
    setTimeout(() => setEntering(false), 400);
  }

  useEffect(() => {
    const h = e => {
      if (e.key==='ArrowRight'||e.key==='ArrowDown') go(cur+1);
      if (e.key==='ArrowLeft' ||e.key==='ArrowUp')   go(cur-1);
    };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [cur]);

  const Slide = SLIDES[cur];

  return (
    <div
      style={{ position:'fixed', inset:0, background:T.bg, color:T.cream, display:'flex', flexDirection:'column', userSelect:'none' }}
      onClick={() => go(cur+1)}
    >
      {/* slide */}
      <div style={{ flex:1, position:'relative', overflow:'hidden' }}>
        <Slide active={true}/>
      </div>

      {/* playback bar */}
      <div
        style={{ height:56, borderTop:`1px solid ${T.border}`, display:'flex', alignItems:'center', padding:'0 36px', gap:20, background:'rgba(8,6,8,.8)', backdropFilter:'blur(12px)', flexShrink:0 }}
        onClick={e => e.stopPropagation()}
      >
        {/* label */}
        <div style={{ fontFamily:'Cormorant Garamond', fontSize:14, color:T.muted, minWidth:100 }}>
          {LABELS[cur] || 'Harbour Barbers'}
        </div>

        {/* track */}
        <div style={{ flex:1, display:'flex', gap:3, alignItems:'center' }}>
          {SLIDES.map((_,i) => (
            <div
              key={i} onClick={() => go(i)}
              style={{ flex:1, height:2, borderRadius:1, cursor:'pointer', position:'relative', background:T.border, overflow:'hidden' }}
            >
              <div style={{ position:'absolute', left:0, top:0, bottom:0, width:i<cur?'100%':i===cur?'100%':'0%', background:i<=cur?T.accent:'transparent', transition:'width .3s ease', borderRadius:1 }}/>
            </div>
          ))}
        </div>

        {/* controls */}
        <div style={{ display:'flex', gap:8, alignItems:'center' }}>
          <button onClick={() => go(cur-1)} disabled={cur===0} style={{ width:32, height:32, borderRadius:8, border:`1px solid ${T.border}`, background:'transparent', display:'flex', alignItems:'center', justifyContent:'center', cursor:cur>0?'pointer':'not-allowed', opacity:cur>0?1:.3, color:T.muted, fontSize:16, lineHeight:1 }}>
            ‹
          </button>
          <span style={{ fontSize:11, color:T.muted, fontVariantNumeric:'tabular-nums', minWidth:40, textAlign:'center' }}>
            {cur+1} / {SLIDES.length}
          </span>
          <button onClick={() => go(cur+1)} disabled={cur===SLIDES.length-1} style={{ width:32, height:32, borderRadius:8, border:`1px solid ${T.border}`, background:cur<SLIDES.length-1?T.accent:'transparent', display:'flex', alignItems:'center', justifyContent:'center', cursor:cur<SLIDES.length-1?'pointer':'not-allowed', opacity:cur<SLIDES.length-1?1:.3, color:'#fff', fontSize:16, lineHeight:1 }}>
            ›
          </button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
