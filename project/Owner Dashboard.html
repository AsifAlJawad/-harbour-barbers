<style>

const { useState, useEffect } = React;

function useLoading(ms=700) {
  const [loading,setLoading] = useState(true);
  useEffect(()=>{const t=setTimeout(()=>setLoading(false),ms);return()=>clearTimeout(t);},[]);
  return loading;
}

function Skel({w='100%',h='20px',r='8px',style={}}) {
  return <div style={{width:w,height:h,borderRadius:r,background:'linear-gradient(90deg,var(--beige) 25%,var(--cream) 50%,var(--beige) 75%)',backgroundSize:'200% 100%',animation:'shimmer 1.4s infinite',...style}}/>;
}

function useIsMobile() {
  const [mob, setMob] = useState(window.innerWidth < 768);
  useEffect(() => {
    const h = () => setMob(window.innerWidth < 768);
    window.addEventListener('resize', h);
    return () => window.removeEventListener('resize', h);
  }, []);
  return mob;
}

// ── Icon ──────────────────────────────────────────────
function Ico({d,size=16}) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
      stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
      <path d={d}/>
    </svg>
  );
}

// ── Charts ────────────────────────────────────────────
function BarChart({data,labels,color='var(--accent)',unit='$'}) {
  const [ready,setReady]=useState(false);
  useEffect(()=>{const t=setTimeout(()=>setReady(true),80);return()=>clearTimeout(t);},[]);
  const max = Math.max(...data);
  const W=54,PAD=4,H=110;
  return (
    <svg viewBox={'0 0 '+(data.length*W)+' '+(H+24)} style={{width:'100%',height:'130px',overflow:'visible'}}>
      {data.map((val,i) => {
        const barH = max ? Math.max((val/max)*(H-20), val?4:0) : 0;
        const x=i*W+PAD, y=H-barH;
        const cx=x+(W-PAD*2)/2;
        return (
          <g key={i}>
            <rect x={x} y={y} width={W-PAD*2} height={barH} fill={color} rx="3" opacity="0.88"
              style={{transformOrigin:cx+'px '+H+'px',transform:ready?'scaleY(1)':'scaleY(0)',transition:'transform 0.6s cubic-bezier(0.34,1.3,0.64,1) '+(i*0.07)+'s'}}/>
            <text x={i*W+W/2} y={H+16} textAnchor="middle" fontSize="11" fill="var(--muted)" fontFamily="var(--sans)">{labels[i]}</text>
            {val>0 && <text x={i*W+W/2} y={y-5} textAnchor="middle" fontSize="10" fill={color} fontFamily="var(--sans)" fontWeight="600">{unit}{val>=1000?Math.round(val/100)/10+'k':val}</text>}
          </g>
        );
      })}
    </svg>
  );
}

function LineChart({data,labels}) {
  const max=Math.max(...data), min=Math.min(...data)*0.85;
  const W=600,H=90,n=data.length;
  const px=i=>(i/(n-1))*W, py=v=>H-((v-min)/(max-min))*H;
  const pts=data.map((v,i)=>`${px(i)},${py(v)}`).join(' ');
  const area=`M${px(0)},${H} `+data.map((v,i)=>`L${px(i)},${py(v)}`).join(' ')+` L${px(n-1)},${H} Z`;
  return (
    <svg viewBox={`0 0 ${W} ${H+28}`} style={{width:'100%',height:'120px',overflow:'visible'}}>
      <defs>
        <linearGradient id="ag" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="var(--accent)" stopOpacity="0.18"/>
          <stop offset="100%" stopColor="var(--accent)" stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={area} fill="url(#ag)"/>
      <polyline points={pts} fill="none" stroke="var(--accent)" strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>
      {data.map((v,i) => (
        <g key={i}>
          <circle cx={px(i)} cy={py(v)} r="4" fill="var(--accent)"/>
          <text x={px(i)} y={H+20} textAnchor="middle" fontSize="11" fill="var(--muted)" fontFamily="var(--sans)">{labels[i]}</text>
        </g>
      ))}
    </svg>
  );
}

function HeatBar({label,pct}) {
  const col = pct>75?'var(--accent)':pct>45?'#c2793a':'var(--tan)';
  return (
    <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'7px'}}>
      <div style={{width:'34px',fontSize:'11px',color:'var(--muted)',textAlign:'right',flexShrink:0}}>{label}</div>
      <div style={{flex:1,height:'9px',background:'var(--beige)',borderRadius:'5px',overflow:'hidden'}}>
        <div style={{height:'100%',width:pct+'%',background:col,borderRadius:'5px'}}/>
      </div>
      <div style={{width:'30px',fontSize:'11px',color:col,fontWeight:'600',textAlign:'right',flexShrink:0}}>{pct}%</div>
    </div>
  );
}

function KpiCard({label,value,sub,trend,accent}) {
  const up = trend>=0;
  return (
    <div style={{background:accent?'var(--dark)':'#fff',border:`1px solid ${accent?'transparent':'var(--beige)'}`,borderRadius:'12px',padding:'16px 18px'}}>
      <div style={{fontSize:'10px',fontWeight:'600',letterSpacing:'0.1em',textTransform:'uppercase',color:accent?'rgba(255,255,255,0.4)':'var(--muted)',marginBottom:'8px'}}>{label}</div>
      <div style={{fontFamily:'var(--serif)',fontSize:'30px',fontWeight:'700',lineHeight:'1',color:accent?'#fff':'var(--dark)',marginBottom:'5px'}}>{value}</div>
      <div style={{display:'flex',alignItems:'center',gap:'5px',flexWrap:'wrap'}}>
        {trend!==undefined && <span style={{fontSize:'11px',color:up?'#2a7a3a':'var(--accent)',fontWeight:'600'}}>{up?'↑':'↓'} {Math.abs(trend)}%</span>}
        <span style={{fontSize:'11px',color:accent?'rgba(255,255,255,0.38)':'var(--muted)'}}>{sub}</span>
      </div>
    </div>
  );
}

function SBadge({status}) {
  const map = {
    done:      {bg:'#f0f0f0',color:'#666',label:'Done'},
    active:    {bg:'#e8f4ea',color:'#2a7a3a',label:'In Chair'},
    confirmed: {bg:'#eef2ff',color:'#3730a3',label:'Confirmed'},
    noshow:    {bg:'#fff7ed',color:'#c2410c',label:'No Show'},
  };
  const s=map[status]||map.confirmed;
  return <span style={{fontSize:'11px',padding:'3px 9px',borderRadius:'100px',background:s.bg,color:s.color,fontWeight:'600',whiteSpace:'nowrap'}}>{s.label}</span>;
}

    {key:'beard-only',      label:'Beard Only',         tab:'Beard',    price:25},
    {key:'hot-towel-shave', label:'Hot Towel Shave',    tab:'Beard',    price:55},
    {key:'shaving',         label:'Shaving',            tab:'Beard',    price:20},

              {ACCENT_SWATCHES.map((c,i)=>(
                <button key={c} onClick={()=>setTweaks(p=>({...p,accent:c}))} title={SWATCH_NAMES[i]} style={{width:'40px',height:'40px',background:c,borderRadius:'8px',border:tweaks.accent===c?'3px solid var(--dark)':'3px solid transparent',cursor:'pointer',position:'relative',outline:'none',boxShadow:tweaks.accent===c?'0 0 0 1px var(--dark)':undefined}}>
                  {tweaks.accent===c && <span style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',color:'#fff',fontSize:'13px',fontWeight:'700',textShadow:'0 1px 2px rgba(0,0,0,0.5)'}}>✓</span>}
                </button>
              ))}
            </div>
            <div style={{fontSize:'11px',color:'var(--muted)'}}>{SWATCH_NAMES[ACCENT_SWATCHES.indexOf(tweaks.accent)]||'Custom colour'}</div>
          </div>
          {[['shopName','Shop Name'],['tagline','Tagline'],['heroText','Hero Heading']].map(([k,l])=>(
            <div key={k} style={{marginBottom:'13px'}}>
              <div style={lbl}>{l}</div>
              <input style={inp} value={tweaks[k]} onChange={e=>setTweaks(p=>({...p,[k]:e.target.value}))}/>
            </div>
          ))}
          <div style={{marginTop:'6px',padding:'12px 14px',background:'var(--cream)',borderRadius:'8px',fontSize:'12px',color:'var(--muted)',lineHeight:'1.6'}}>
            <strong style={{color:'var(--dark)'}}>Backend required:</strong> These controls are UI prototypes only. Once the backend is connected, saving here will update <code style={{fontSize:'11px',background:'var(--beige)',padding:'1px 5px',borderRadius:'3px'}}>Harbour Barbers.html</code> via the CMS API.
          </div>
        </div>
      )}
      {stab==='rules' && (
        <div style={{background:'#fff',border:'1px solid var(--beige)',borderRadius:'13px',padding:'20px 22px'}}>
          <div style={{fontFamily:'var(--serif)',fontSize:'19px',fontWeight:'600',marginBottom:'14px'}}>Business Rules</div>
          {[['loyalty','Loyalty Program','Enable points earning and redemption'],['onlineBooking','Online Bookings','Allow customers to book via the website']].map(([k,label,desc],i,arr)=>(
            <div key={k} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'11px 0',borderBottom:i<arr.length-1?'1px solid var(--beige)':'none',marginBottom:i===arr.length-1?'14px':'0'}}>
              <div style={{paddingRight:'16px'}}>
                <div style={{fontSize:'14px',fontWeight:'500',marginBottom:'2px'}}>{label}</div>
                <div style={{fontSize:'12px',color:'var(--muted)'}}>{desc}</div>
              </div>
              <button onClick={()=>setPrefs(p=>({...p,[k]:!p[k]}))} style={{width:'44px',height:'24px',borderRadius:'12px',background:prefs[k]?'var(--accent)':'var(--tan)',position:'relative',cursor:'pointer',transition:'background 0.2s',border:'none',flexShrink:0}}>
                <div style={{position:'absolute',top:'4px',left:prefs[k]?'22px':'4px',width:'16px',height:'16px',borderRadius:'50%',background:'#fff',transition:'left 0.2s'}}/>
              </button>
            </div>
          ))}
          <div style={{display:'grid',gridTemplateColumns:isMobile?'1fr 1fr':'1fr 1fr 1fr',gap:'10px'}}>
            {[['window','Booking Window (days)'],['cancelHours','Cancel Window (hrs)'],['commission','Staff Commission (%)']].map(([k,l])=>(
              <div key={k}>
                <div style={lbl}>{l}</div>
                <input style={inp} type="number" value={prefs[k]} onChange={e=>setPrefs(p=>({...p,[k]:e.target.value}))}/>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}


// ── App ────────────────────────────────────────────────
function App() {
  const isMobile = useIsMobile();
  const [view,setView] = useState('overview');
  const views = {overview:OverviewView,analytics:AnalyticsView,staff:StaffView,settings:SettingsView};
  const View = views[view]||OverviewView;
  return (
    <div style={{display:'flex',flexDirection:'column',height:'100vh',overflow:'hidden'}}>
      {isMobile && <MobileHeader/>}
      <div style={{display:'flex',flex:1,overflow:'hidden'}}>
        {!isMobile && <Sidebar view={view} setView={setView}/>}
        <main style={{flex:1,overflowY:'auto',background:'var(--cream)',padding:isMobile?'20px 16px':'44px 52px'}}>
          <View isMobile={isMobile}/>
        </main>
      </div>
      {isMobile && <MobileNav items={NAV} view={view} setView={setView}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
