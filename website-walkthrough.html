const C = {

  card:   '#1a1517',
  border: '#2a2325',
  accent: '#8b2635',
  gold:   '#c9a96e',
  cream:  '#f7f5f0',
  muted:  '#8a7f7a',
  tan:    '#4a3f3a',
  green:  '#2a6a4a',
};

const slides = [

  { id: 'signin' },

  { id: 'portal' },
  { id: 'staff' },
  { id: 'owner' },
  { id: 'close' },

/* ── tiny animation hook ── */
function useIn(active) {
  const [vis, setVis] = useState(false);
  useEffect(() => {
    if (active) { const t = setTimeout(() => setVis(true), 60); return () => clearTimeout(t); }
    else setVis(false);
  }, [active]);
  return vis;
}

/* ── Browser shell ── */
function Browser({ url, children, style }) {
  return (
    <div style={{ borderRadius: 10, overflow: 'hidden', boxShadow: '0 32px 80px rgba(0,0,0,.6)', border: `1px solid ${C.border}`, ...style }}>
      <div style={{ background: '#1e1a1b', padding: '8px 12px', display: 'flex', alignItems: 'center', gap: 8 }}>

          {['#ff5f57','#ffbd2e','#28c840'].map(c => <div key={c} style={{ width: 8, height: 8, borderRadius: '50%', background: c }}/>)}
        </div>
        <div style={{ flex: 1, background: '#141011', borderRadius: 4, padding: '3px 10px', fontSize: 10, color: C.muted, fontFamily: 'monospace' }}>
          {url}
        </div>
      </div>
      <div style={{ background: '#f7f5f0' }}>{children}</div>
    </div>
  );
}

const SLIDES = [SlideIntro, SlideLanding, SlideSignIn, SlideBookService, SlideBookTime, SlidePortal, SlideStaff, SlideOwner, SlideClose];
const TITLES = ['','Landing Page','Authentication','Booking: Service','Booking: Time Slot','Customer Portal','Staff Dashboard','Owner Analytics',''];

function App() {
  const [cur, setCur] = useState(0);
  const [prev, setPrev] = useState(null);
  const [dir, setDir] = useState(1);

  function go(n) {
    if (n < 0 || n >= SLIDES.length) return;
    setDir(n > cur ? 1 : -1);
    setPrev(cur);
    setCur(n);
    setTimeout(() => setPrev(null), 500);
  }

  useEffect(() => {
    const h = (e) => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(cur + 1);
      if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   go(cur - 1);
    };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [cur]);

  const Slide = SLIDES[cur];

  return (
    <div style={{ position: 'fixed', inset: 0, background: C.bg, color: C.cream, display: 'flex', flexDirection: 'column' }} onClick={() => go(cur + 1)}>
      {/* slide area */}
      <div style={{ flex: 1, position: 'relative', overflow: 'hidden' }}>
        <div style={{ position: 'absolute', inset: 0, opacity: 1, transition: 'opacity .4s ease' }}>
          <Slide active={true} />
        </div>
      </div>

      {/* bottom bar */}
      <div style={{ height: 52, borderTop: `1px solid ${C.border}`, display: 'flex', alignItems: 'center', padding: '0 32px', gap: 20, flexShrink: 0 }} onClick={e => e.stopPropagation()}>
        <div style={{ fontFamily: 'Cormorant Garamond', fontSize: 14, color: C.muted, minWidth: 80 }}>
          {cur > 0 && cur < SLIDES.length - 1 ? TITLES[cur] : 'Harbour Barbers'}
        </div>
        <div style={{ flex: 1, display: 'flex', gap: 4 }}>
          {SLIDES.map((_, i) => (
            <div key={i} onClick={() => go(i)} style={{ flex: 1, height: 3, borderRadius: 2, background: i <= cur ? C.accent : C.border, cursor: 'pointer', transition: 'background .3s' }}/>
          ))}
        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          <div onClick={() => go(cur - 1)} style={{ width: 28, height: 28, borderRadius: 6, border: `1px solid ${C.border}`, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: cur > 0 ? 'pointer' : 'default', opacity: cur > 0 ? 1 : .3, color: C.muted, fontSize: 13 }}>‹</div>
          <span style={{ fontSize: 11, color: C.muted }}>{cur + 1} / {SLIDES.length}</span>
          <div onClick={() => go(cur + 1)} style={{ width: 28, height: 28, borderRadius: 6, border: `1px solid ${C.border}`, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: cur < SLIDES.length - 1 ? 'pointer' : 'default', opacity: cur < SLIDES.length - 1 ? 1 : .3, color: C.muted, fontSize: 13 }}>›</div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
